<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrickBook Widget</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.tb-widget{
    width:100%;
    max-width:900px;
    margin:auto;
    background:#fff;
    border:1px solid #e5e7eb;
    border-left:4px solid #22c55e;
    border-radius:10px;
    padding:14px 16px;
}

.tb-badge{
    display:inline-block;
    background:#ecfdf5;
    color:#16a34a;
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.08em;
    padding:4px 8px;
    border-radius:20px;
    margin-bottom:8px;
}

.tb-title{
    font-size:22px;
    font-weight:700;
    line-height:1.25;
    color:#222;
    margin-bottom:12px;
}

.tb-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
}

.tb-features{
    display:flex;
    flex-wrap:wrap;
    gap:10px 16px;
    font-size:13px;
    color:#444;
}

.tb-features span{
    color:#16a34a;
    font-weight:600;
}

.tb-btn{
    background:#22c55e;
    color:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
    padding:11px 18px;
    border-radius:8px;
    white-space:nowrap;
    transition:.2s;
}

.tb-btn:hover{
    background:#16a34a;
}

@media(max-width:640px){

.tb-widget{
    padding:14px;
}

.tb-title{
    font-size:18px;
}

.tb-bottom{
    flex-direction:column;
    align-items:flex-start;
}

.tb-features{
    font-size:12px;
    gap:8px 12px;
}

.tb-btn{
    width:100%;
    text-align:center;
    margin-top:6px;
}

}
</style>
</head>

<body>

<div class="tb-widget">

    <div class="tb-badge">
        TrickBook Recommendation
    </div>

    <div class="tb-title">
        Master the Percentage Shortcut Used By Toppers!
    </div>

    <div class="tb-bottom">

        <div class="tb-features">
            <span>✓ Unlimited Tricks</span>
            <span>✓ Save Time</span>
            <span>✓ Share Tricks</span>
        </div>

        <a href="https://testbook-website.github.io/testbook-trickbook/" target="_blank" class="tb-btn">
            Explore →
        </a>

    </div>

</div>

</body>
</html>
